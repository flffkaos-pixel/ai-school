<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content — Awesome Generative AI Guide</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .content-viewer { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }
    .content-viewer h1 { font-size: 2rem; margin: 32px 0 16px; }
    .content-viewer h2 { font-size: 1.5rem; margin: 28px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .content-viewer h3 { font-size: 1.2rem; margin: 24px 0 10px; }
    .content-viewer p { margin-bottom: 16px; line-height: 1.7; color: var(--text-secondary); }
    .content-viewer ul, .content-viewer ol { margin: 0 0 16px 24px; color: var(--text-secondary); }
    .content-viewer li { margin-bottom: 6px; }
    .content-viewer img { max-width: 100%; border-radius: 8px; margin: 16px 0; border: 1px solid var(--border); }
    .content-viewer blockquote { border-left: 4px solid var(--primary); padding: 12px 20px; margin: 16px 0; background: var(--bg-secondary); border-radius: 0 8px 8px 0; color: var(--text-secondary); }
    .content-viewer pre { background: var(--bg-secondary); padding: 16px; border-radius: 8px; overflow-x: auto; margin: 16px 0; font-size: 0.85rem; border: 1px solid var(--border); }
    .content-viewer code { background: var(--bg-secondary); padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; }
    .content-viewer pre code { background: none; padding: 0; }
    .content-viewer table { width: 100%; border-collapse: collapse; margin: 16px 0; }
    .content-viewer th, .content-viewer td { padding: 10px 14px; border: 1px solid var(--border); text-align: left; font-size: 0.9rem; }
    .content-viewer th { background: var(--bg-secondary); font-weight: 600; }
    .content-viewer hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    .content-viewer a { color: var(--primary); }
    .content-viewer strong { color: var(--text); }
    .viewer-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .viewer-header .back { color: var(--text-secondary); font-size: 0.9rem; text-decoration: none; display: flex; align-items: center; gap: 4px; }
    .viewer-header .back:hover { color: var(--primary); }
    .viewer-header h1 { font-size: 1.4rem; margin: 0; border: none; }
    .loading { text-align: center; padding: 80px 0; color: var(--text-secondary); }
    .loading .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { text-align: center; padding: 80px 0; color: #e74c3c; }
  </style>
</head>
<body>

<nav>
  <div class="container">
    <a href="index.html" class="logo">awesome<span>GenAI</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="courses.html">Courses</a>
      <a href="interview.html">Interview</a>
      <a href="research.html">Research</a>
      <a href="resources.html">Resources</a>
      <a href="about.html">About</a>
      <a href="ko/viewer.html" style="font-weight:600;color:var(--primary)">KO</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
    </div>
    <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
  </div>
</nav>

<div class="content-viewer" id="content">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Loading content...</p>
  </div>
</div>

<footer>
  <div class="container">
    <p>Part of <a href="https://github.com/aishwaryanr/awesome-generative-ai-guide" target="_blank">awesome-generative-ai-guide</a> by Aishwarya Naresh Reganti &middot; MIT License</p>
  </div>
</footer>

<script src="js/main.js"></script>
<script>
const repo = 'aishwaryanr/awesome-generative-ai-guide';
const branch = 'main';
const rawBase = `https://raw.githubusercontent.com/${repo}/${branch}/`;
const githubBase = `https://github.com/${repo}/blob/${branch}/`;

function getPath() {
  const p = new URLSearchParams(location.search).get('path');
  return p ? decodeURIComponent(p) : null;
}

function getTitleFromPath(path) {
  if (!path) return 'Content';
  const name = path.split('/').pop().replace(/\.md$/i, '').replace(/[-_]/g, ' ');
  return name.charAt(0).toUpperCase() + name.slice(1);
}

async function loadContent() {
  const path = getPath();
  const container = document.getElementById('content');

  if (!path) {
    container.innerHTML = '<div class="error"><h2>No path specified</h2><p>Use ?path= to specify a file.</p></div>';
    return;
  }

  try {
    const rawUrl = rawBase + path;
    const resp = await fetch(rawUrl);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    let markdown = await resp.text();

    const title = getTitleFromPath(path);
    const backLink = document.referrer && document.referrer.includes(location.host)
      ? 'javascript:history.back()'
      : 'javascript:void(0)';

    // Rewrite relative image URLs to GitHub raw URLs
    markdown = markdown.replace(/\]\(((?!https?:\/\/)[^)]+)\)/g, (match, url) => {
      if (url.startsWith('http')) return match;
      const resolved = url.startsWith('/') ? rawBase + url.slice(1) : rawBase + path.substring(0, path.lastIndexOf('/') + 1) + url;
      return `](${resolved})`;
    });

    // Rewrite relative links to GitHub
    markdown = markdown.replace(/\[([^\]]*)\]\(((?!https?:\/\/)[^)]+)\)/g, (match, text, url) => {
      if (url.startsWith('http') || url.startsWith('#') || url.startsWith('mailto:')) return match;
      const resolved = url.startsWith('/') ? githubBase + url.slice(1) : githubBase + path.substring(0, path.lastIndexOf('/') + 1) + url;
      return `[${text}](${resolved})`;
    });

    const html = marked.parse(markdown, { breaks: true, gfm: true });

    container.innerHTML = `
      <div class="viewer-header">
        <a href="${backLink}" class="back" onclick="if(this.href==='javascript:void(0)'){window.location.href='index.html';return false}">← Back</a>
        <h1>${title}</h1>
      </div>
      ${html}
    `;

    // Open all external links in new tab
    container.querySelectorAll('a[href^="http"]').forEach(a => a.setAttribute('target', '_blank'));

  } catch (err) {
    container.innerHTML = `
      <div class="viewer-header">
        <a href="javascript:history.back()" class="back">← Back</a>
        <h1>Error</h1>
      </div>
      <div class="error">
        <h2>Failed to load content</h2>
        <p>${err.message}</p>
        <p style="margin-top:16px"><a href="${githubBase}${path}" target="_blank">View on GitHub →</a></p>
      </div>
    `;
  }
}

loadContent();
</script>
</body>
</html>
